; platformio.ini - Финальная конфигурация

[env:esp32-c3-devkitm-1]
platform = espressif32@6.5.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

upload_port = COM4
monitor_port = COM4

; Включаем файловую систему SPIFFS
board_build.filesystem = spiffs
lib_ldf_mode = deep+

; Библиотеки для веб-сервера, WebSockets и JSON
lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/esphome/AsyncTCP.git
	bblanchon/ArduinoJson

; Флаги сборки для USB и стандарта C++14
build_flags = 
	-DARDUINO_USB_MODE=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-std=c++14